<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 EcoShop - Tất cả sản phẩm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-gray-50 font-sans">
    <!-- NAVBAR -->
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div
          class="flex items-center gap-3 text-2xl font-bold text-emerald-600"
        >
          🌿 EcoShop
        </div>

        <nav
          class="hidden md:flex items-center gap-8 text-gray-700 font-medium"
        >
          <a href="index.html" class="hover:text-emerald-600 transition"
            >Trang chủ</a
          >
          <a href="products.html" class="text-emerald-600 font-semibold"
            >Sản phẩm</a
          >
          <a href="cart.html" class="hover:text-emerald-600 transition"
            >Giỏ hàng</a
          >
          <a href="about.html" class="hover:text-emerald-600 transition"
            >Giới thiệu</a
          >
          <a href="contact.html" class="hover:text-emerald-600 transition"
            >Liên hệ</a
          >
        </nav>

        <a
          href="cart.html"
          class="relative text-3xl hover:text-emerald-600 transition"
        >
          🛒
          <span
            id="cart-count"
            class="absolute -top-2 -right-2 bg-emerald-600 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full"
            >0</span
          >
        </a>
      </div>
    </header>

    <!-- SEARCH -->
    <section class="max-w-4xl mx-auto px-6 pt-8 pb-6">
      <div class="bg-white rounded-3xl shadow-xl p-2">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Tìm kiếm sản phẩm hữu cơ..."
          onkeyup="searchProducts()"
          class="w-full px-8 py-6 rounded-3xl focus:outline-none text-lg border border-transparent focus:border-emerald-300"
        />
      </div>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="max-w-7xl mx-auto px-6 pb-20">
      <h1 class="text-3xl font-bold text-center mb-10 text-gray-800">
        🛒 Tất cả sản phẩm
      </h1>

      <div
        id="product-list"
        class="product-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"
      >
        <!-- Sản phẩm load bằng JS -->
      </div>

      <!-- PHÂN TRANG -->
      <div
        id="pagination"
        class="flex items-center justify-center gap-3 mt-16"
      ></div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-gray-400 py-12">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <p>© 2026 EcoShop - Thực phẩm hữu cơ sạch</p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
