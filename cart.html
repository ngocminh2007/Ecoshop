<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 EcoShop - Giỏ hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-gray-50 font-sans">
    <!-- NAVBAR -->
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div
          class="flex items-center gap-3 text-2xl font-bold text-emerald-600"
        >
          🌿 EcoShop
        </div>
        <nav
          class="hidden md:flex items-center gap-8 text-gray-700 font-medium"
        >
          <a href="index.html">Trang chủ</a>
          <a href="products.html">Sản phẩm</a>
          <a href="cart.html" class="text-emerald-600 font-semibold"
            >Giỏ hàng</a
          >
        </nav>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
      <h1
        class="text-4xl font-bold mb-10 flex items-center gap-4 text-gray-800"
      >
        🛒 Giỏ hàng của bạn
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <!-- Danh sách sản phẩm -->
        <div class="lg:col-span-2">
          <div id="cart-items" class="space-y-6"></div>
        </div>

        <!-- Sidebar -->
        <div class="lg:col-span-1">
          <div
            class="bg-gradient-to-br from-emerald-50 to-white border border-emerald-100 rounded-3xl shadow-xl p-8 sticky top-6"
          >
            <h3 class="text-2xl font-bold mb-6 text-emerald-800">
              Tóm tắt đơn hàng
            </h3>

            <!-- Voucher -->
            <div
              class="mb-8 bg-white p-5 rounded-2xl border border-emerald-100"
            >
              <h4 class="font-medium mb-3 text-emerald-700">🎟️ Mã giảm giá</h4>
              <div class="flex gap-3">
                <input
                  type="text"
                  id="voucher-code"
                  placeholder="Nhập mã voucher"
                  class="flex-1 px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-500"
                />
                <button
                  onclick="applyVoucher()"
                  class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 rounded-2xl font-medium"
                >
                  Áp dụng
                </button>
              </div>
              <p id="voucher-message" class="text-sm mt-2 min-h-[24px]"></p>
            </div>

            <!-- Tổng tiền -->
            <div class="space-y-5 text-lg">
              <div class="flex justify-between">
                <span class="text-gray-600">Tổng tiền hàng:</span>
                <span id="subtotal" class="font-semibold">0 ₫</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">Giảm giá voucher:</span>
                <span id="discount" class="text-red-500 font-medium">-0 ₫</span>
              </div>
              <div
                class="flex justify-between text-2xl font-bold border-t pt-5 border-emerald-100"
              >
                <span class="text-emerald-800">Tổng thanh toán:</span>
                <span id="total-price" class="text-emerald-600">0 ₫</span>
              </div>
            </div>

            <!-- Thông tin đặt hàng -->
            <div class="mt-10">
              <h4 class="font-semibold mb-4 text-emerald-800">
                Thông tin đặt hàng
              </h4>
              <input
                type="text"
                id="customer-name"
                placeholder="Họ và tên *"
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4"
              />
              <input
                type="tel"
                id="customer-phone"
                placeholder="Số điện thoại *"
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4"
              />
              <textarea
                id="customer-address"
                rows="3"
                placeholder="Địa chỉ nhận hàng *"
                class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-500"
              ></textarea>
            </div>

            <button
              onclick="checkout()"
              class="w-full mt-8 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white py-5 rounded-3xl text-xl font-semibold transition shadow-lg"
            >
              Đặt hàng ngay
            </button>

            <a
              href="products.html"
              class="block text-center text-emerald-600 mt-6 hover:underline"
            >
              ← Tiếp tục mua sắm
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="js/cart.js"></script>
  </body>
</html>
