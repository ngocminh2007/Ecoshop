<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>🛒 Giỏ hàng</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">🛒 Giỏ hàng EcoShop</div>

      <nav>
        <a href="index.html"> Trang chủ </a>

        <a href="products.html"> Sản phẩm </a>
      </nav>
    </header>

    <section class="page">
      <h2>🌿 Sản phẩm đã chọn</h2>

      <div id="cart-items" class="product-grid"></div>

      <h2 id="total-price">Tổng tiền: 0 VNĐ</h2>
    </section>

    <!-- FORM ORDER -->
    <section class="checkout">
      <h2>📦 Thông tin đặt hàng</h2>

      <div class="checkout-form">
        <input type="text" id="fullname" placeholder="Họ và tên" />

        <input type="text" id="phone" placeholder="Số điện thoại" />

        <textarea id="address" rows="4" placeholder="Địa chỉ giao hàng">
        </textarea>

        <button onclick="checkout()">🛍️ Đặt hàng</button>
      </div>
    </section>

    <script src="js/cart.js"></script>
  </body>
</html>
