<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <title>Admin</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">⚙️ Admin EcoShop</div>
    </header>

    <section class="admin-section">
      <h2>Quản lý sản phẩm</h2>

      <div class="form-box">
        <input type="text" id="name" placeholder="Tên sản phẩm" />

        <input type="number" id="price" placeholder="Giá" />

        <input type="text" id="image" placeholder="Link ảnh" />

        <button onclick="addNewProduct()">➕ Thêm</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Ảnh</th>

            <th>Tên</th>

            <th>Giá</th>

            <th>Hành động</th>
          </tr>
        </thead>

        <tbody id="admin-product-list"></tbody>
      </table>
    </section>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
