<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 EcoShop - Chi tiết sản phẩm</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-gray-50 font-sans">
    <!-- NAVBAR -->
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div
          class="flex items-center gap-3 text-2xl font-bold text-emerald-600"
        >
          🌿 EcoShop
        </div>
        <nav
          class="hidden md:flex items-center gap-8 text-gray-700 font-medium"
        >
          <a href="index.html" class="hover:text-emerald-600 transition"
            >Trang chủ</a
          >
          <a href="products.html" class="hover:text-emerald-600 transition"
            >Sản phẩm</a
          >
          <a href="cart.html" class="hover:text-emerald-600 transition"
            >Giỏ hàng</a
          >
        </nav>
        <a href="cart.html" class="text-2xl hover:text-emerald-600 transition"
          >🛒</a
        >
      </div>
    </header>

    <!-- PRODUCT DETAIL -->
    <section class="max-w-7xl mx-auto px-6 py-12">
      <a
        href="products.html"
        class="inline-flex items-center gap-2 text-emerald-600 hover:text-emerald-700 mb-8 font-medium"
      >
        ← Quay lại danh sách sản phẩm
      </a>

      <div id="detail" class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <!-- Nội dung chi tiết sẽ được load bằng JavaScript -->
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-gray-400 py-12">
      <div class="max-w-7xl mx-auto px-6 text-center">
        <p>© 2026 EcoShop - Thực phẩm hữu cơ sạch</p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/detail.js"></script>
  </body>
</html>
